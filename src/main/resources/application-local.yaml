spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/common_ground?currentSchema=common_ground
    username: common_ground_user
    password: common_ground_password

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8012

commonground:
  auth:
    admin-emails:
      - dev@local.test
    dev-bypass:
      enabled: true
      email: dev@local.test


